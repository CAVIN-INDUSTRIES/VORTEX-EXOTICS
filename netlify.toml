# Netlify Configuration for VEX Public Website
# This file ensures reproducible builds regardless of UI settings

[build]
  # Build from workspace root but target only the web app
  base = "."
  publish = "apps/web/dist"
  command = "pnpm install --frozen-lockfile && pnpm --filter @vex/web run build"

[build.environment]
  # Explicit versions for reproducibility
  NODE_VERSION = "20"
  NPM_FLAGS = "--version" # Prevents npm from running, we use pnpm
  # pnpm version is controlled by packageManager field in package.json

# Next.js on Netlify requires specific handling
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  # Note: API is deployed separately (Render/Railway), this is for edge functions if needed

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = [""]} # Only for non-existent paths

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }
