name: Web quality

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/shared/**"
      - "packages/cinematic/**"
      - "packages/3d-configurator/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/quality.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: quality:web + quality:3d
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (Chromium) for a11y
        run: pnpm --filter @vex/web exec playwright install --with-deps chromium

      - name: quality:web (Turbo — cacheable; depends on ^build)
        run: pnpm exec turbo run quality:web --filter=@vex/web

      - name: quality:3d (after build graph)
        run: pnpm turbo run quality:3d --filter=@vex/web
